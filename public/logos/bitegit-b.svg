<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="g" x1="15" y1="15" x2="485" y2="485" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e8d8"/>
      <stop offset="100%" stop-color="#00a8e0"/>
    </linearGradient>
    <!-- Global mask: cuts chevron void + B bump holes -->
    <mask id="gm">
      <rect width="500" height="500" fill="white"/>
      <!-- Chevron inner void (triangle pointing left) -->
      <polygon points="0,82 224,252 0,422" fill="black"/>
      <!-- Upper bump inner D-hole -->
      <path d="M256,52 L336,52 Q436,52 436,132 Q436,212 336,212 L256,212 Z" fill="black"/>
      <!-- Gap between bumps -->
      <rect x="224" y="224" width="260" height="26" fill="black"/>
      <!-- Lower bump inner D-hole -->
      <path d="M256,268 L344,268 Q452,268 452,360 Q452,450 344,450 L256,450 Z" fill="black"/>
    </mask>
  </defs>

  <g mask="url(#gm)" fill="url(#g)">
    <!-- CHEVRON ">" — upper arm -->
    <polygon points="15,15 245,236 218,280 10,72"/>
    <!-- CHEVRON ">" — lower arm -->
    <polygon points="218,280 245,264 15,485 10,428"/>

    <!-- B — full-height spine -->
    <rect x="222" y="15" width="46" height="470" rx="8"/>

    <!-- B — upper D bump (spine to right) -->
    <rect x="260" y="15" width="148" height="218"/>
    <rect x="320" y="15" width="160" height="218" rx="109"/>

    <!-- B — lower D bump (slightly taller/wider) -->
    <rect x="260" y="250" width="166" height="235"/>
    <rect x="330" y="250" width="160" height="235" rx="117"/>
  </g>
</svg>
